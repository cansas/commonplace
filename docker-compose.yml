services:
  commonplace:
    build: .
    ports:
      - "8765:8765"
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - COMMONPLACE_USERNAME=${COMMONPLACE_USERNAME:-admin}
      - COMMONPLACE_PASSWORD=${COMMONPLACE_PASSWORD}
      - SESSION_SECRET=${SESSION_SECRET}
    restart: unless-stopped
    labels:
      - "app=commonplace"
